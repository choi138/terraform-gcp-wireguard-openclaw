documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "docs/**"
          - "**/*.md"

enhancement:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.tf"
          - "infra/templates/**"
          - "infra/examples/**"
          - "tests/**"
          - ".github/workflows/**"
